apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-admin-ui
  namespace: henderson
  labels:
    app.kubernetes.io/name: auth-admin-ui
    app.kubernetes.io/part-of: tigersoft-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-admin-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-admin-ui
        app.kubernetes.io/name: auth-admin-ui
        app.kubernetes.io/part-of: tigersoft-auth
    spec:
      containers:
        - name: auth-admin-ui
          image: 855407392262.dkr.ecr.ap-southeast-7.amazonaws.com/tigersoft-auth-admin-ui:7221cdf1d36ec0b838834e1263846e6b27b0b6ed
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: auth-admin-ui-config
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false   # Next.js standalone writes cache
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
